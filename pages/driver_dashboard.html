<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideDo | Driver Dashboard</title>
  <link rel="stylesheet" href="../css/driver_dashboard.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="left">
    <img src="../assets/logo.png" class="logo" alt="RideDo">
    <span class="brand">RideDo</span>
  </div>

  <nav class="nav-links">
    <a href="driver_dashboard.html" class="active">Dashboard</a>
    <a href="available_driver_rides.html">Available Rides</a>
    <a href="driver_bookings.html">My Bookings</a>
    <a href="driver_profile.html">My Profile</a>
    <a href="../index.html" class="logout">Logout</a>
  </nav>
</header>

<!-- DASHBOARD -->
<section class="dashboard">

  <h2>Driver Dashboard</h2>
  <p class="subtitle">Complete your driver verification details</p>

  <div class="card rides-section">
    <h3>Available Driver Requests</h3>
    <div id="driverRidesContainer" class="table-container">
      <table class="data-table">
        <thead>
            <tr>
                <th>Route</th>
                <th>Schedule</th>
                <th>Duration</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="ridesTableBody">
            <tr><td colspan="4" style="text-align: center;">Loading requests...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</section>

<script src="../JS/api.js"></script>
<script src="../JS/driver_dashboard_dynamic.js"></script>

</body>
</html>
