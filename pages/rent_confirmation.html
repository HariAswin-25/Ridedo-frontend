<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideDo | Booking Confirmed</title>
  <link rel="stylesheet" href="../css/rent_confirmation.css">
</head>
<body>

<header class="navbar">
  <div class="left">
    <img src="../assets/logo.png" class="logo" alt="RideDo">
    <span class="brand">RideDo</span>
  </div>
</header>

<section class="confirmation-section">
  <div class="confirmation-card">

    <div class="check-icon">✓</div>

    <h2>Booking Confirmed!</h2>
    <p class="message">
      Your rental vehicle has been successfully booked.
    </p>

    <div class="info-box">
      <p><strong>Pickup Point:</strong> <span id="rent_pickup">Loading...</span></p>
      <p><strong>Status:</strong> Confirmed</p>
      <p><strong>Payment:</strong> Pay at pickup</p>
    </div>

    <a href="../landingpage.html" class="home-btn">
      Back to Home
    </a>

  </div>
</section>

<script src="../JS/confirmation.js"></script>

</body>
</html>
